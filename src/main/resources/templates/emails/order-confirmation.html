<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedido confirmado</title>
</head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border:1px solid #e8e8e8;">

          <!-- Header -->
          <tr>
            <td style="padding:40px 48px 32px;border-bottom:1px solid #f0f0f0;">
              <p style="margin:0;font-size:18px;font-weight:400;letter-spacing:0.2em;color:#111;">
                ELEMENTAL
              </p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:40px 48px;">
              <h1 style="margin:0 0 8px;font-size:14px;font-weight:600;letter-spacing:0.15em;color:#111;">
                COMPRA CONFIRMADA
              </h1>
              <p style="margin:0 0 32px;font-size:12px;color:#888;letter-spacing:0.04em;">
                Gracias por tu pedido. Lo estamos preparando con cuidado.
              </p>

              <!-- Detalles -->
              <table width="100%" cellpadding="0" cellspacing="0" style="border-top:1px solid #f0f0f0;margin-bottom:32px;">
                <tr>
                  <td style="padding:16px 0;border-bottom:1px solid #f0f0f0;">
                    <p style="margin:0;font-size:10px;letter-spacing:0.12em;color:#aaa;text-transform:uppercase;">
                      Número de pedido
                    </p>
                    <p style="margin:4px 0 0;font-size:13px;color:#111;font-weight:500;"
                       th:text="'#' + ${orderId}">
                      #00
                    </p>
                  </td>
                </tr>
                <tr>
                  <td style="padding:16px 0;border-bottom:1px solid #f0f0f0;">
                    <p style="margin:0;font-size:10px;letter-spacing:0.12em;color:#aaa;text-transform:uppercase;">
                      Total
                    </p>
                    <p style="margin:4px 0 0;font-size:13px;color:#111;font-weight:500;"
                       th:text="${total} + ' €'">
                      0.00 €
                    </p>
                  </td>
                </tr>
                <tr>
                  <td style="padding:16px 0;">
                    <p style="margin:0;font-size:10px;letter-spacing:0.12em;color:#aaa;text-transform:uppercase;">
                      Entrega estimada
                    </p>
                    <p style="margin:4px 0 0;font-size:13px;color:#111;font-weight:500;"
                       th:text="${deliveryDate}">
                      dd/MM/yyyy
                    </p>
                  </td>
                </tr>
              </table>

              <p style="margin:0;font-size:11px;color:#aaa;letter-spacing:0.04em;line-height:1.7;">
                Puedes consultar el estado de tu pedido en cualquier momento
                desde tu cuenta en nuestra web.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:24px 48px;border-top:1px solid #f0f0f0;background:#fafafa;">
              <p style="margin:0;font-size:10px;color:#bbb;letter-spacing:0.06em;">
                © 2026 ELEMENTAL · Todos los derechos reservados
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
